services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: coffee_shop_db
    ports:
      - "5432:5432"
    volumes:
      - coffee_shop_data:/var/lib/postgresql/data

volumes:
  coffee_shop_data: